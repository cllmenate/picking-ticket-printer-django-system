# ─── Railway Config: Celery Worker ────────────────────────────────────────────
# Dashboard: Create a new service → same repo → Config Path: railway-worker.toml
# Docs: https://docs.railway.com/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/django/Dockerfile"
watchPatterns = [
    "apps/**",
    "core/**",
    "docker/django/**",
    "pyproject.toml",
    "uv.lock",
]

[deploy]
# Celery worker — processes background tasks from Redis broker
startCommand = "celery -A core worker -l info --concurrency 2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
