# ─── Railway Config: Web Service (Django / Uvicorn) ──────────────────────────
# Docs: https://docs.railway.com/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/django/Dockerfile"
watchPatterns = [
    "apps/**",
    "core/**",
    "theme/**",
    "docker/django/**",
    "pyproject.toml",
    "uv.lock",
]

[deploy]
# Startup is handled by docker/django/entrypoint.sh (expands $PORT via shell)
# Migrations and static collection run BEFORE the new container receives traffic
preDeployCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear && python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.filter(username='${{SUPERUSER_USERNAME}}').delete(); User.objects.create_superuser('${{SUPERUSER_USERNAME}}', '${{SUPERUSER_EMAIL}}', '${{SUPERUSER_PASSWORD}}')\""
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.teardown]
# Zero-downtime deployment: old container stays alive during transition
overlapSeconds = 10
drainingSeconds = 30
